<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>福霖智能 CRM - 運勢與健康顧問版</title>
    <!-- 引入萬年曆大腦 -->
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <style>
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; max-width: 600px; margin: 0 auto; padding: 15px; background-color: #f0fdf4; color: #1e293b; line-height: 1.6; }
        h2 { color: #166534; text-align: center; margin-bottom: 25px; font-weight: 800; text-shadow: 1px 1px 2px rgba(0,0,0,0.05); }
        .card { background: white; padding: 25px 20px; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); margin-bottom: 25px; border-top: 6px solid #22c55e; }
        input, textarea { width: 100%; padding: 14px; margin: 12px 0; border: 1px solid #cbd5e1; border-radius: 10px; box-sizing: border-box; font-size: 16px; background-color: #f8fafc; }
        .date-input-group { display: flex; align-items: center; gap: 10px; margin: 12px 0; }
        .date-input-group label { min-width: 80px; font-weight: bold; color: #475569; }
        .date-input-group input { margin: 0; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        button { flex: 1; min-width: 100px; padding: 12px 5px; border: none; border-radius: 10px; cursor: pointer; font-size: 15px; font-weight: bold; }
        .btn-save { background: linear-gradient(135deg, #22c55e, #16a34a); color: white; width: 100%; margin-top: 10px; }
        .btn-save:disabled { background: #94a3b8; cursor: not-allowed; }
        .btn-tool { background-color: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
        .copy-btn { background: #334155; color: white; margin-top: 15px; width: 100%; padding: 12px; }
        #toolOutput { background: #eff6ff; padding: 18px; border-radius: 12px; border: 2px dashed #3b82f6; margin-top: 18px; min-height: 50px; white-space: pre-wrap; display: none; color: #1e3a8a; font-size: 15px; position: relative; }
        .info-tag { display: block; background: #fee2e2; color: #991b1b; padding: 10px 12px; border-radius: 8px; font-size: 14px; font-weight: bold; margin-bottom: 12px; border-left: 4px solid #ef4444; line-height: 1.5; }
        .info-tag.fortune { background: #fef3c7; color: #92400e; border-left-color: #f59e0b; }
        .info-tag.birthday { background: #fdf4ff; color: #86198f; border-left-color: #d946ef; }
        .record-card { background: white; padding: 18px; border-radius: 12px; margin-bottom: 15px; border-left: 6px solid #3b82f6; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .record-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .record-name { font-weight: bold; font-size: 17px; color: #0f172a; }
        .record-date { font-size: 12px; color: #64748b; background: #f1f5f9; padding: 4px 8px; border-radius: 6px; }
        .record-content { white-space: pre-wrap; margin: 0; color: #334155; font-size: 15px; }
        #searchBar { border: 2px solid #3b82f6; padding: 10px; margin-bottom: 20px; width: 100%; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

    <h2>🤝 福霖智能 CRM (運勢顧問版)</h2>

    <div class="card">
        <input type="text" id="clientName" placeholder="👤 輸入客戶姓名 (例如：林先生)">
        
        <div class="date-input-group">
            <label>🎂 生日：</label>
            <input type="date" id="clientBirth">
        </div>

        <textarea id="interactionContent" rows="3" placeholder="📝 筆記、保單或近期狀況..."></textarea>
        
        <button class="btn-save" id="saveBtn" onclick="saveRecord()">儲存紀錄至雲端</button>

        <div style="margin-top: 25px; padding-top: 15px; border-top: 1px solid #eee;">
            <p style="margin:0 0 10px 0; font-weight:bold; color: #4338ca;">✨ 智能命理分析與互動：</p>
            <div class="btn-group">
                <button class="btn-tool" onclick="generateWish('birthday')">🎂 生日祝賀</button>
                <button class="btn-tool" onclick="generateWish('health')">🩺 健康關懷</button>
                <button class="btn-tool" onclick="generateWish('fortune')">🗓️ 流月運勢</button>
            </div>
            <div class="btn-group">
                <button class="btn-tool" onclick="generateWish('insurance')">📄 續保提醒</button>
                <button class="btn-tool" onclick="generateWish('festival')">🧧 節日問候</button>
            </div>
            
            <div id="toolOutput"></div>
            <button id="copyBtn" class="copy-btn" style="display:none;" onclick="copyWish()">📋 複製發送文字</button>
            <button id="lineBtn" class="btn-save" style="display:none; background: #06C755; margin-top: 10px;" onclick="shareToLine()">💬 傳送至 LINE</button>
        </div>
    </div>

    <input type="text" id="searchBar" onkeyup="filterRecords()" placeholder="🔍 搜尋紀錄...">
    <div id="recordList"></div>

    <script>
        // 🌟 這裡已經幫你填好你專屬的 Google Apps Script 網址了！
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyn7ZSp6_BdtPUTi7VIKtG-B8wpLc5J-r3iJKY8ZjfvBkyzZF34XwdMgV4Ad0Kun72NSg/exec";

        window.onload = displayRecords;

        // 核心大腦 1：分析日主與健康
        function analyzeBazi(dateStr) {
            if (!dateStr) return null;
            try {
                const [year, month, day] = dateStr.split('-');
                const solar = Solar.fromYmd(parseInt(year), parseInt(month), parseInt(day));
                const lunar = solar.getLunar();
                const bazi = lunar.getEightChar();
                const gan = bazi.getDayGan(); 
                
                const healthMap = {
                    '甲': { element: '木', organ: '肝、膽', risk: '熬夜勞神、神經緊繃' },
                    '乙': { element: '木', organ: '肝、膽', risk: '熬夜勞神、神經緊繃' },
                    '丙': { element: '火', organ: '心臟、小腸', risk: '心血管循環、血壓' },
                    '丁': { element: '火', organ: '心臟、小腸', risk: '心血管循環、血壓' },
                    '戊': { element: '土', organ: '脾、胃', risk: '腸胃脹氣、消化不良' },
                    '己': { element: '土', organ: '脾、胃', risk: '腸胃脹氣、消化不良' },
                    '庚': { element: '金', organ: '肺、大腸', risk: '呼吸道、過敏咳嗽' },
                    '辛': { element: '金', organ: '肺、大腸', risk: '呼吸道、過敏咳嗽' },
                    '壬': { element: '水', organ: '腎、膀胱', risk: '泌尿系統、手腳冰冷' },
                    '癸': { element: '水', organ: '腎、膀胱', risk: '泌尿系統、手腳冰冷' }
                };
                return { gan: gan, ...healthMap[gan] };
            } catch (e) {
                return null;
            }
        }

        // 核心大腦 2：十神碰撞矩陣
        const tenGodsMatrix = {
            '甲': {'甲':'比肩','乙':'劫財','丙':'食神','丁':'傷官','戊':'偏財','己':'正財','庚':'七殺','辛':'正官','壬':'偏印','癸':'正印'},
            '乙': {'甲':'劫財','乙':'比肩','丙':'傷官','丁':'食神','戊':'正財','己':'偏財','庚':'正官','辛':'七殺','壬':'正印','癸':'偏印'},
            '丙': {'甲':'偏印','乙':'正印','丙':'比肩','丁':'劫財','戊':'食神','己':'傷官','庚':'偏財','辛':'正財','壬':'七殺','癸':'正官'},
            '丁': {'甲':'正印','乙':'偏印','丙':'劫財','丁':'比肩','戊':'傷官','己':'食神','庚':'正財','辛':'偏財','壬':'正官','癸':'七殺'},
            '戊': {'甲':'七殺','乙':'正官','丙':'偏印','丁':'正印','戊':'比肩','己':'劫財','庚':'食神','辛':'傷官','壬':'偏財','癸':'正財'},
            '己': {'甲':'正官','乙':'七殺','丙':'正印','丁':'偏印','戊':'劫財','己':'比肩','庚':'傷官','辛':'食神','壬':'正財','癸':'偏財'},
            '庚': {'甲':'偏財','乙':'正財','丙':'七殺','丁':'正官','戊':'偏印','己':'正印','庚':'比肩','辛':'劫財','壬':'食神','癸':'傷官'},
            '辛': {'甲':'正財','乙':'偏財','丙':'正官','丁':'七殺','戊':'正印','己':'偏印','庚':'劫財','辛':'比肩','壬':'傷官','癸':'食神'},
            '壬': {'甲':'食神','乙':'傷官','丙':'偏財','丁':'正財','戊':'七殺','己':'正官','庚':'偏印','辛':'正印','壬':'比肩','癸':'劫財'},
            '癸': {'甲':'傷官','乙':'食神','丙':'正財','丁':'偏財','戊':'正官','己':'七殺','庚':'正印','辛':'偏印','壬':'劫財','癸':'比肩'}
        };

        // 核心大腦 3：抓取流月天干
        function getCurrentMonthGan() {
            const today = new Date();
            const solarToday = Solar.fromDate(today);
            return solarToday.getLunar().getEightChar().getMonthGan();
        }

        function generateWish(type) {
            try {
                const nameInput = document.getElementById('clientName').value.trim();
                const name = nameInput ? nameInput : "親愛的客戶";
                const birthStr = document.getElementById('clientBirth').value;
                const baziData = analyzeBazi(birthStr);
                
                let message = "";
                let tagHtml = "";

                if (type === 'birthday') {
                    if (baziData) {
                        tagHtml = `<div class="info-tag birthday">🎂 顧問提示：客戶日主【${baziData.gan}${baziData.element}】<br>為您準備了專屬性格的生日祝福！</div>`;
                        if (baziData.gan === '甲') message = `${name}，祝您生日快樂！🎂\n看著您總是充滿活力、不斷向上成長，真的很替您開心。願您未來的每一天都能如大樹般茁壯，順利達成所有目標！`;
                        if (baziData.gan === '乙') message = `${name}，祝您生日快樂！🎂\n感謝您一直以來的溫和親切，與您相處總是如沐春風。願新的一年，我們能繼續長久相伴，祝您平安順心！`;
                        if (baziData.gan === '丙') message = `${name}，祝您生日快樂！🎂\n您就像小太陽一樣，總是帶給身邊的人熱情與正能量！願您未來的日子繼續閃閃發光，充滿熱情與歡笑！`;
                        if (baziData.gan === '丁') message = `${name}，祝您生日快樂！🎂\n謝謝您總是那麼體貼、注重細節，帶給人溫暖的感受。願這份溫馨也能圍繞著您，祝您心想事成、平安健康。`;
                        if (baziData.gan === '戊') message = `${name}，祝您生日快樂！🎂\n您給人的感覺總是那麼踏實、可靠，是大家最安心的後盾。願您的未來也如大地般穩健，每一步都走得踏實順利！`;
                        if (baziData.gan === '己') message = `${name}，祝您生日快樂！🎂\n謝謝您總是如此包容、照顧身邊的人。願您在新的一年裡，也能被滿滿的愛與溫暖包圍，像家人般守護著您。`;
                        if (baziData.gan === '庚') message = `${name}，祝您生日快樂！🎂\n非常欣賞您的果斷與專業魄力！願您未來的事業與生活，都能如同淬鍊後的金屬般，展現最大的價值與光芒！`;
                        if (baziData.gan === '辛') message = `${name}，祝您生日快樂！🎂\n您總是散發著獨特的品味與高雅的氣質。願這特別的日子，帶給您最精緻、尊榮的美好體驗，事事順心如意。`;
                        if (baziData.gan === '壬') message = `${name}，祝您生日快樂！🎂\n跟您聊天總是那麼輕鬆自在、充滿智慧。願您的生活能如同流水般自在順流，無論到哪都能激起美好的浪花！`;
                        if (baziData.gan === '癸') message = `${name}，祝您生日快樂！🎂\n您總是那麼溫柔細緻，給人平靜的力量。在這特別的日子，願您擁有最美好、純粹的心靈平靜與幸福。`;
                    } else {
                        message = `${name}，祝您生日快樂！🎂\n在這特別的日子，祝福您身體健康、萬事如意，感謝您一直以來的信任。`;
                    }

                } else if (type === 'health') {
                    if (baziData) {
                        tagHtml = `<div class="info-tag">🩺 顧問提示：客戶日主【${baziData.gan}${baziData.element}】<br>先天弱項：${baziData.organ}｜注意：${baziData.risk}</div>`;
                        if (baziData.element === '木') message = `${name}您好，最近氣候變化大，想到您平時工作較勞心，體質上肝膽負擔容易較重。記得盡量少熬夜，讓神經放鬆休息喔！若需補充相關醫療保障資訊，隨時跟我說。`;
                        if (baziData.element === '火') message = `${name}您好，最近氣溫起伏不定，您天生體質要特別留意心血管和血壓狀況。平常多補充水分、注意睡眠品質喔！有任何保單或健康疑問，隨時聯繫我。`;
                        if (baziData.element === '土') message = `${name}您好，最近換季時節，您腸胃系統比較敏感，飲食上要多留意，少吃生冷食物喔！照顧好脾胃最重要，有需要任何協助隨時找我。`;
                        if (baziData.element === '金') message = `${name}您好，最近早晚溫差大，您天生氣管跟呼吸道較敏感。出門記得多帶件薄外套保護喉嚨，別感冒囉！有需要我服務的地方，隨時傳訊給我。`;
                        if (baziData.element === '水') message = `${name}您好，最近天氣忽冷忽熱，您體質容易手腳冰冷，代謝循環要多注意。記得多喝溫水注意保暖喔！把身體照顧好最重要，祝您順心！`;
                    } else {
                        message = `${name}您好，最近天氣變化大，出門記得多留意保暖喔！若有任何需要服務的地方，隨時跟我說。`;
                    }
                
                } else if (type === 'fortune') {
                    if (!baziData) {
                        alert("要測算流月運勢，請先輸入客戶的生日喔！");
                        return;
                    }
                    const currentMonthGan = getCurrentMonthGan();
                    const tenGod = tenGodsMatrix[baziData.gan][currentMonthGan];
                    
                    tagHtml = `<div class="info-tag fortune">🗓️ 顧問提示：本月天干為【${currentMonthGan}】<br>客戶本月走【${tenGod}】運<br>請依此十神特性給予關心！</div>`;

                    if (tenGod === '比肩' || tenGod === '劫財') {
                        message = `${name}您好！這個月您的人際交流會比較頻繁，雖然熱鬧但也容易有較多預期外的開銷喔。提醒您在忙碌之餘，也要稍微留意一下財務的控管。如果有需要重新檢視資產配置，隨時找我喝杯咖啡！☕`;
                    } else if (tenGod === '食神' || tenGod === '傷官') {
                        message = `${name}您好！這個月您的想法會特別豐富、行動力也很強，但同時也容易勞心勞力，消耗比較大。衝刺事業之餘，千萬要注意適度休息，別累壞身體了！若想了解如何透過醫療險轉嫁健康風險，隨時可以討論喔！🛡️`;
                    } else if (tenGod === '正財' || tenGod === '偏財') {
                        message = `${name}您好！這個月是您財星閃耀的月份，事業心重且收穫滿滿！💰 不過在打拼的同時，也別忘了將辛苦賺來的財富做好穩健的守護。如果有想了解最新的理財規劃或退休傳承，這會是非常棒的時機喔！`;
                    } else if (tenGod === '正官' || tenGod === '七殺') {
                        message = `${name}您好！這個月您可能會面臨較多的工作挑戰與責任壓力，雖然能展現能力，但也容易感到疲憊或身體微恙。請務必留意壓力帶來的健康警訊喔！我們做理財規劃，最重要的就是為這種高壓時期準備好堅實的後盾，加油！💪`;
                    } else if (tenGod === '正印' || tenGod === '偏印') {
                        message = `${name}您好！這個月非常適合您沉澱心情、放慢腳步來思考未來的長遠規劃。📚 趁著這個思緒清晰的月份，如果您想為自己或家人檢視長期的照護規劃、或是長遠的資產傳承，都很適合提出來一起討論喔！祝您本月平靜順心。`;
                    }

                } else if (type === 'insurance') {
                    message = `${name}您好，提醒您保單續保期即將到來。📄\n為了確保您的保障不中斷，近日我會再聯繫您確認細節，有問題隨時私訊我喔！`;
                } else if (type === 'festival') {
                    message = `祝福${name} 佳節愉快！🏮\n願您與家人平安健康，心想事成，事事順心！`;
                }

                const output = document.getElementById('toolOutput');
                output.innerHTML = tagHtml + `<div id="actualMessage">${message}</div>`;
                output.style.display = 'block';
                document.getElementById('copyBtn').style.display = 'block';
                document.getElementById('lineBtn').style.display = 'block'; 
            } catch (error) {
                alert("按鈕出現小錯誤：" + error.message);
            }
        }

        function copyWish() {
            const textToCopy = document.getElementById('actualMessage').innerText;
            const tempTextArea = document.createElement("textarea");
            tempTextArea.value = textToCopy.trim();
            document.body.appendChild(tempTextArea);
            tempTextArea.select();
            document.execCommand("copy");
            document.body.removeChild(tempTextArea);
            alert("已複製到剪貼簿！");
        }

        function shareToLine() {
            const textToShare = document.getElementById('actualMessage').innerText;
            const encodedText = encodeURIComponent(textToShare.trim());
            const lineUrl = "https://line.me/R/msg/text/?" + encodedText;
            window.location.href = lineUrl;
        }

        // GitHub Pages 專用的儲存方式 (Fetch API)
        async function saveRecord() {
            const name = document.getElementById('clientName').value;
            const content = document.getElementById('interactionContent').value;
            if (!name || !content) return alert("請輸入客戶姓名與內容喔！");

            const btn = document.getElementById('saveBtn');
            btn.innerText = "資料飛向雲端中... ☁️";
            btn.disabled = true;

            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify({ name: name, content: content })
                });
                
                document.getElementById('clientName').value = "";
                document.getElementById('clientBirth').value = "";
                document.getElementById('interactionContent').value = "";
                alert("太棒了！資料已安全存入 Google 試算表！");
                displayRecords(); 
            } catch (error) {
                alert("哎呀，儲存失敗了。請檢查網路連線。");
            } finally {
                btn.innerText = "儲存紀錄至雲端";
                btn.disabled = false;
            }
        }

        // GitHub Pages 專用的讀取方式 (Fetch API)
        async function displayRecords() {
            const list = document.getElementById('recordList');
            list.innerHTML = "<p style='text-align:center; color:gray;'>正在從 Google 雲端抓取最新資料...</p>";
            
            try {
                const response = await fetch(GOOGLE_SCRIPT_URL);
                const records = await response.json();
                
                list.innerHTML = records.map((item) => `
                    <div class="record-card">
                        <div class="record-header">
                            <span class="record-name">${item.name}</span>
                            <span class="record-date">${item.date}</span>
                        </div>
                        <p class="record-content">${item.content}</p>
                    </div>
                `).join('');
            } catch (e) {
                list.innerHTML = "<p style='color:red; text-align:center;'>無法連線至雲端資料庫。</p>";
            }
        }

        function filterRecords() {
            const s = document.getElementById('searchBar').value.toLowerCase();
            const cards = document.getElementsByClassName('record-card');
            for (let c of cards) c.style.display = c.innerText.toLowerCase().includes(s) ? "block" : "none";
        }
    </script>
</body>
</html>
