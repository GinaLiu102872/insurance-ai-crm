<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客戶管理系統 - 雲端連線版</title>
<style>
body { font-family:'Microsoft JhengHei', sans-serif; max-width:600px; margin:0 auto; padding:15px; background:#f0fdf4; color:#1e293b; }
h2 { text-align:center; color:#166534; }
.card { background:white; padding:25px 20px; border-radius:16px; box-shadow:0 10px 25px rgba(0,0,0,.1); margin-bottom:25px; border-top:6px solid #22c55e; }
input, textarea { width:100%; padding:14px; margin:12px 0; border:1px solid #cbd5e1; border-radius:10px; box-sizing:border-box; font-size:16px; }
button { width:100%; padding:14px; border:none; border-radius:10px; background:#22c55e; color:white; font-size:16px; font-weight:bold; }
.btn-tool { background:#f1f5f9; color:#475569; border:1px solid #e2e8f0; margin-top:10px; }
#toolOutput { background:#eff6ff; padding:18px; border-radius:12px; border:2px dashed #3b82f6; margin-top:18px; display:none; white-space:pre-wrap; }
</style>
</head>

<body>

<h2>🤝 客戶互動與智能祝賀系統</h2>

<div class="card">
  <input type="text" id="clientName" placeholder="👤 輸入客戶姓名，例如：林先生">
  <input type="date" id="expireDate">
  <textarea id="interactionContent" rows="4" placeholder="📝 筆記、保單內容或待辦事項..."></textarea>

  <button id="saveBtn" onclick="saveRecord()">儲存紀錄至雲端</button>

  <hr style="margin:25px 0;">

  <p><b>✨ 快速生成祝賀內容：</b></p>
  <button class="btn-tool" onclick="generateWish('birthday')">🎂 生日</button>
  <button class="btn-tool" onclick="generateWish('insurance')">📄 續保</button>
  <button class="btn-tool" onclick="generateWish('festival')">🧧 節日</button>

  <div id="toolOutput"></div>
</div>

<script>
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyn7ZSp6_BdtPUTi7VIKtG-B8wpLc5J-r3iJKY8ZjfvBkyzZF34XwdMgV4Ad0Kun72NSg/exec";

function saveRecord() {
  const name = document.getElementById("clientName").value.trim();
  const expire = document.getElementById("expireDate").value;
  const note = document.getElementById("interactionContent").value.trim();

  if (!name || !note) {
    alert("請輸入客戶姓名與內容");
    return;
  }

  const btn = document.getElementById("saveBtn");
  btn.innerText = "資料儲存中...";
  btn.disabled = true;

  const data = {
    name: name,
    expire: expire,
    note: note
  };

  fetch(GOOGLE_SCRIPT_URL, {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify(data)
  });

  alert("已送出至 Google 試算表！");

  document.getElementById("clientName").value = "";
  document.getElementById("expireDate").value = "";
  document.getElementById("interactionContent").value = "";

  btn.innerText = "儲存紀錄至雲端";
  btn.disabled = false;
}

function generateWish(type) {
  const name = document.getElementById("clientName").value.trim() || "朋友";
  let message = "";

  if (type === "birthday") {
    message = `親愛的${name}，祝您生日快樂！🎂\n在這特別的日子，祝福您身體健康、萬事如意，感謝您一直以來的信任。`;
  }

  if (type === "insurance") {
    message = `親愛的${name}您好，提醒您保單續保期即將到來。📄\n為了確保您的保障不中斷，近日我會再聯繫您確認細節，有問題隨時私訊我喔！`;
  }

  if (type === "festival") {
    message = `祝福${name}佳節愉快！🏮\n願您與家人平安健康，心想事成，事事順心！`;
  }

  const output = document.getElementById("toolOutput");
  output.innerText = message;
  output.style.display = "block";
}
</script>

</body>
</html>
